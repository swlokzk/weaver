services:
  rag-service:
    build: ./python-rag-service
    ports:
      - "8001:8001"

  mcp-server:
    build: ./ts-mcp-server
    environment:
      - RAG_SERVICE_URL=http://rag-service:8001
    depends_on:
      - rag-service
    ports:
      - "8002:8002"

  rust-gateway:
    build: ./rust-gateway
    environment:
      - TRUSTED_CLIENT_CERT_FP=demo-client-fp
      - SIGNING_SECRET=demo-signing-secret
      - MCP_SERVER_URL=http://mcp-server:8002
    depends_on:
      - mcp-server
    ports:
      - "8000:8000"
